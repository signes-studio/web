<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>SIGNES.STUDIO — Review Portal</title>
    <!-- Importación de la tipografía oficial para mantener consistencia de marca -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;400;500&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* Estética Unificada: SIGNES.STUDIO Warm Minimalism System */
        :root {
            --bg: #F4F4F4;        
            --ink: #000000;       
            --ink-muted: #777777; 
            --line: #EAEAEA;
            --sidebar-w: 260px;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg);
            color: var(--ink);
            letter-spacing: 0.06em;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* DISEÑO DE CONTENEDORES PRINCIPALES (ESPEJO DE LA WEB MAIN) */
        #canvas {
            display: flex;
            width: 100%;
            height: 100%;
        }
        
        header { 
            width: var(--sidebar-w);
            height: 100%;
            padding: 3.5rem 2rem 3.5rem 3.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-shrink: 0;
            border-right: 1px solid var(--line);
            z-index: 100;
        }
        
        .header-top-group {
            display: flex;
            flex-direction: column;
        }
        
        /* Ajuste de logo para calcar la web principal */
        .logo { 
            font-family: 'Oswald', sans-serif;
            font-size: 24px; 
            text-transform: uppercase; 
            letter-spacing: 0.06em; 
            color: var(--ink);
            line-height: 1.1;
        }
        .logo .bold { font-weight: 400; }
        .logo .light { font-weight: 200 !important; }

        .tagline {
            font-size: 8.5px;
            color: var(--ink-muted);
            margin-top: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            display: block;
        }

        /* METADATOS DEL PROYECTO SELECCIONADO */
        .project-info-block {
            margin-top: 2.5rem;
            padding-top: 1.2rem;
            border-top: 1px solid var(--line);
        }
        .project-title { 
            font-size: 14px; 
            font-weight: 400; 
            letter-spacing: 0.02em; 
            margin-bottom: 4px; 
            text-transform: uppercase; 
        }
        .client-name { 
            font-size: 11px; 
            color: var(--ink-muted); 
            font-weight: 300; 
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* NAVEGACIÓN DINÁMICA DE REVISIONES */
        .main-nav {
            margin-top: 2rem;
            padding-top: 1.2rem;
            border-top: 1px solid var(--line);
        }
        .main-nav ul { 
            list-style: none; 
        }
        .main-nav li { 
            margin-bottom: 0.6rem; 
            text-transform: uppercase; 
            font-size: 11px; 
            color: var(--ink-muted);
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .main-nav li:hover, .main-nav li.active-link { 
            color: var(--ink); 
            font-weight: 500;
        }

        /* PARTE BAJA DE LA COLUMNA: COPYRIGHT Y IDIOMAS ULTRA MINIMALISTAS */
        .header-bottom-group {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            padding-top: 2rem;
        }

        .header-copyright {
            font-size: 10px;
            color: var(--ink-muted);
        }

        /* Selector de idioma inline sutil como en los canales de contacto */
        .lang-switch {
            display: flex;
            align-items: center;
            font-size: 10px;
            color: var(--ink-muted);
            text-transform: uppercase;
            gap: 0.3rem;
        }
        .lang-btn {
            font-family: 'Manrope', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--ink-muted);
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 400;
            transition: color 0.2s ease;
            padding: 0;
        }
        .lang-btn:hover, .lang-btn.active { color: var(--ink); font-weight: 500; }
        
        /* LIENZO DERECHO DESLIZABLE (CANVAS) */
        #pageWrapper {
            flex-grow: 1;
            height: 100%;
            overflow-y: auto;
            position: relative;
        }

        #app {
            padding: 3.5rem 4rem;
            width: 100%;
            min-height: 100%;
        }
        
        /* Secciones y Grid de Renders */
        .fase-section { 
            display: none; 
            animation: fadeIn 0.3s ease forwards;
        }
        .fase-section.active-section {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fase-header {
            border-bottom: 1px solid var(--line); 
            padding-bottom: 12px; 
            margin-bottom: 28px; 
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 16px;
        }
        .fase-title { 
            font-size: 11px; 
            font-weight: 500; 
            text-transform: uppercase; 
            letter-spacing: 0.08em; 
            color: var(--ink-muted); 
            margin: 0;
        }
        .download-all-btn {
            font-family: 'Manrope', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--ink);
            background: none;
            border: 1px solid var(--line);
            padding: 5px 12px;
            border-radius: 0px;
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
            transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }
        .download-all-btn:hover:not(:disabled) { color: var(--bg); background: var(--ink); border-color: var(--ink); }
        .download-all-btn:disabled { opacity: 0.4; cursor: default; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 28px; 
        }
        
        /* Tarjeta del Render estilo Galería */
        .image-card { 
            background: #ffffff; 
            border: 1px solid var(--line); 
            padding: 12px; 
            position: relative;
            cursor: zoom-in; 
            transition: transform 0.25s ease, box-shadow 0.25s ease; 
        }
        .image-card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(0,0,0,0.03); 
        }
        .image-card img { width: 100%; height: 210px; object-fit: cover; display: block; }
        .image-caption { 
            font-size: 11px; 
            color: var(--ink); 
            margin-top: 12px; 
            text-align: left; 
            font-weight: 400; 
            text-transform: uppercase; 
        }
        
        /* Botón de descarga directa sobre la miniatura */
        .thumb-download {
            position: absolute;
            top: 22px;
            right: 22px;
            background: rgba(244, 244, 244, 0.95);
            border: 1px solid var(--line);
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            text-decoration: none;
            color: var(--ink);
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s ease, background 0.2s ease, color 0.2s ease;
            z-index: 10;
        }
        .image-card:hover .thumb-download { opacity: 1; }
        .thumb-download:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }

        /* Visor Flotante / Lightbox Superpuesto */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(244, 244, 244, 0.98);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .lightbox.active { opacity: 1; pointer-events: auto; }
        
        .lightbox-wrapper {
            position: relative;
            max-width: 85vw;
            max-height: 75vh;
            overflow: hidden;
            cursor: zoom-in;
        }
        .lightbox img {
            max-width: 100%;
            max-height: 75vh;
            display: block;
            object-fit: contain;
            transition: transform 0.15s ease-out;
            transform-origin: center center;
        }
        .lightbox-wrapper.zoomed { cursor: zoom-out; }
        .lightbox-wrapper.zoomed img { transform: scale(2); }

        .lightbox-close {
            position: absolute;
            top: 35px; right: 40px;
            font-size: 32px; font-weight: 200;
            cursor: pointer; color: var(--ink-muted);
            background: none; border: none;
            z-index: 1010;
        }
        .lightbox-close:hover { color: var(--ink); }

        .nav-btn {
            position: absolute;
            top: 50%; transform: translateY(-50%);
            background: none; border: none;
            font-size: 36px; font-weight: 100; color: var(--ink-muted);
            cursor: pointer; padding: 20px; z-index: 1010;
            transition: color 0.2s ease;
        }
        .nav-btn:hover { color: var(--ink); }
        .nav-prev { left: 20px; }
        .nav-next { right: 20px; }

        /* Barra Inferior del Visor */
        .lightbox-actions {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 24px;
            align-items: center;
            background: #ffffff;
            padding: 12px 28px;
            border: 1px solid var(--line);
            border-radius: 0px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.01);
            z-index: 1010;
        }
        .lightbox-caption { font-size: 11px; font-weight: 400; color: var(--ink); text-transform: uppercase; }
        .lightbox-download {
            font-family: 'Manrope', sans-serif;
            color: var(--ink);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            border-left: 1px solid var(--line);
            padding-left: 18px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .lightbox-download:hover { opacity: 0.5; }

        .security-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 7rem);
            width: 100%;
        }
        #turnstile-widget { margin-top: 24px; }

        /* AVISO LEGAL UBICADO EN LA PARTE INFERIOR DEL ÁREA DE RENDERS */
        footer {
            margin-top: 100px;
            border-top: 1px solid var(--line);
            padding-top: 30px;
            text-align: left;
        }
        .legal-notice {
            max-width: 680px;
            font-size: 10px;
            line-height: 1.6;
            color: var(--ink-muted);
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .status-msg { text-align: center; font-weight: 300; color: var(--ink-muted); font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; }

        /* AJUSTES RESPONSIVOS */
        @media (max-width: 860px) {
            body { overflow-y: auto; height: auto; }
            #canvas { flex-direction: column; }
            header { width: 100%; height: auto; padding: 2.5rem 1.5rem 1.5rem 1.5rem; border-right: none; border-bottom: 1px solid var(--line); }
            .project-info-block { margin-top: 1.5rem; padding-top: 1rem; }
            .main-nav { margin-top: 1.5rem; padding-top: 1rem; }
            .main-nav ul { display: flex; flex-wrap: wrap; gap: 1rem; }
            .main-nav li { margin-bottom: 0; }
            .header-bottom-group { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--line); flex-direction: row; justify-content: space-between; align-items: center; }
            #pageWrapper { height: auto; }
            #app { padding: 2rem 1.5rem; }
            footer { margin-top: 60px; }
            .fase-header { flex-direction: column; gap: 12px; align-items: flex-start; }
            .lightbox img { max-width: 95vw; max-height: 65vh; }
            .lightbox-actions { width: 90%; justify-content: space-between; padding: 12px 16px; bottom: 20px; }
            .nav-btn { font-size: 28px; padding: 10px; }
            .nav-prev { left: 5px; }
            .nav-next { right: 5px; }
        }
    </style>
    <!-- Script Oficial de Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>

<div id="canvas">
    <header id="header">
        <div class="header-top-group">
            <div class="logo">
                <span class="bold">SIGNES</span><span class="light">.STUDIO</span>
            </div>
            <span class="tagline">Visual Research for Architecture</span>
            
            <!-- 1. Nombre del Proyecto y Cliente -->
            <div id="project-meta-wrapper"></div>
            
            <!-- 2. Categorías de navegación interactiva de revisiones -->
            <nav id="reviewNavigation" class="main-nav">
                <ul id="fases-menu"></ul>
            </nav>
        </div>
        
        <!-- 3. Columna izquierda baja fijada al fondo: Copyright e Idioma Inline -->
        <div class="header-bottom-group">
            <p class="header-copyright">© All images by SIGNES.STUDIO</p>
            <div id="lang-wrapper"></div>
        </div>
    </header>

    <div id="pageWrapper" role="main">
        <div id="app">
            <!-- Estado Inicial: Verificación de Seguridad Invisible -->
            <div class="security-wrapper" id="security-layer">
                <div class="status-msg" id="sec-msg">Verifying secure connection...</div>
                <div id="turnstile-widget" class="cf-turnstile" data-sitekey="0x4AAAAAADzPcFSUMS9BwYBI" data-callback="onTurnstileSuccess"></div>
            </div>
        </div>
    </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="forceCloseLightbox()">&times;</button>
    
    <button class="nav-btn nav-prev" onclick="navigateImage(-1, event)">&#8249;</button>
    <button class="nav-btn nav-next" onclick="navigateImage(1, event)">&#8250;</button>
    
    <div class="lightbox-wrapper" id="lightboxWrapper" onclick="toggleZoom(event)" onmousemove="panZoom(event)">
        <img id="lightboxImg" src="" alt="Amplified view">
    </div>
    
    <div class="lightbox-actions">
        <span class="lightbox-caption" id="lightboxCaption"></span>
        <a class="lightbox-download" id="lightboxDownload" href="#" onclick="forceDownload(this.href, this.getAttribute('download'), event)"></a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
    const BUCKET_URL = "https://share.signes.studio";

    const STRINGS = {
        en: {
            htmlLang: 'en',
            pageTitle: 'SIGNES.STUDIO — Review Portal',
            opening: 'Opening confidential review space...',
            verifying: 'Verifying secure connection...',
            invalidLink: 'Error 404: Invalid link.',
            accessDenied: 'Access denied or project ID does not exist in the vault.',
            noImages: 'No images found in this space.',
            amplifiedView: 'Amplified view',
            downloadImage: 'Download Image ↓',
            downloadRender: 'Download render',
            downloadAll: 'Download All',
            preparingZip: 'Preparing…',
            zipProgress: (n, total) => `Downloading ${n}/${total}…`,
            zipError: 'Some images failed to download. Please try again.',
            legalNotice: 'Confidentiality Notice: Access to this link and the contained graphic material is strictly private and exclusive to the client. Its distribution or leakage to third parties is entirely prohibited. To optimize performance and ensure project privacy, all information within this space will be permanently deleted 15 days after project closure and final delivery.',
            fases: {
                rev1: '01. First Draft',
                rev2: '02. Second Draft',
                rev3: '03. Third Draft',
                signes: '04. Final Delivery'
            }
        },
        es: {
            htmlLang: 'es',
            pageTitle: 'SIGNES.STUDIO — Portal de Revisión',
            opening: 'Abriendo espacio de revisión confidencial...',
            verifying: 'Verificando conexión segura...',
            invalidLink: 'Error 404: Enlace no válido.',
            accessDenied: 'Acceso denegado o el ID del proyecto no existe en el búnker de archivos.',
            noImages: 'No se han encontrado imágenes en este espacio.',
            amplifiedView: 'Vista ampliada',
            downloadImage: 'Descargar Imagen ↓',
            downloadRender: 'Descargar render',
            downloadAll: 'Descargar Todo',
            preparingZip: 'Preparando…',
            zipProgress: (n, total) => `Descargando ${n}/${total}…`,
            zipError: 'Algunas imágenes no se han podido descargar. Inténtalo de nuevo.',
            legalNotice: 'Aviso de confidencialidad: El acceso a este enlace y a la documentación gráfica contenida es estrictamente privado y exclusivo para el cliente. Queda totalmente prohibida su distribución o filtración a terceros. Con el fin de optimizar el rendimiento y garantizar la privacidad del encargo, toda la información de este espacio será eliminada permanentemente transcurridos 15 dias desde el cierre y entrega del proyecto.',
            fases: {
                rev1: '01. Primera Revisión',
                rev2: '02. Segunda Revisión',
                rev3: '03. Tercera Revisión',
                signes: '04. Entrega Final'
            }
        },
        ca: {
            htmlLang: 'ca',
            pageTitle: 'SIGNES.STUDIO — Portal de Revisió',
            opening: 'Obrint espai de revisió confidencial...',
            verifying: 'Verificant connexió segura...',
            invalidLink: 'Error 404: Enllaç no vàlid.',
            accessDenied: "Accés denegat o l'ID del projecte no existeix al búnquer d'arxius.",
            noImages: "No s'han trobat imatges en aquest espai.",
            amplifiedView: 'Vista ampliada',
            downloadImage: 'Descarregar Imatge ↓',
            downloadRender: 'Descarregar render',
            downloadAll: 'Descarregar Tot',
            preparingZip: 'Preparant…',
            zipProgress: (n, total) => `Descarregant ${n}/${total}…`,
            zipError: 'Some images failed to download. Please try again.',
            legalNotice: "Avís de confidencialitat: L'accés a aquest enllaç i a la documentació gràfica continguda és estrictament privat i exclusiu per al client. Queda toalment prohibida la seua distribució o filtració a tercers. Amb la finalitat d'optimitzar el rendiment i garantir la privacitat de l'encàrrec, toda la informació d'aquest espai serà eliminada permanentment transcorreguts 15 dies des del tancament i lliurament del projecte.",
            fases: {
                rev1: '01. Primera Revisió',
                rev2: '02. Segona Revisió',
                rev3: '03. Tercera Revisió',
                signes: '04. Lliurament Final'
            }
        }
    };

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    const SUPPORTED_LANGS = Object.keys(STRINGS);
    const DEFAULT_LANG = 'en';

    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get('id');
    const appContainer = document.getElementById('app');

    function detectLang() {
        const urlLang = urlParams.get('lang');
        if (urlLang && SUPPORTED_LANGS.includes(urlLang)) return urlLang;
        const saved = localStorage.getItem('signes_lang');
        if (saved && SUPPORTED_LANGS.includes(saved)) return saved;
        const browserLang = (navigator.language || '').slice(0, 2).toLowerCase();
        if (SUPPORTED_LANGS.includes(browserLang)) return browserLang;
        return DEFAULT_LANG;
    }

    let currentLang = detectLang();
    let T = STRINGS[currentLang];
    let manifestData = null;
    let dataStructure = { rev1: [], rev2: [], rev3: [], signes: [] };
    let globalActiveImages = [];
    let currentImageIndex = 0;

    document.getElementById('sec-msg').innerText = T.verifying;
    document.title = T.pageTitle;

    function onTurnstileSuccess(token) {
        if (!projectId) {
            appContainer.innerHTML = `<div class="status-msg">${T.invalidLink}</div>`;
            return;
        }
        document.getElementById('sec-msg').innerText = T.opening;
        fetchManifest();
    }

    function fetchManifest() {
        fetch(`${BUCKET_URL}/${projectId}/manifest.json`)
            .then(response => {
                if (!response.ok) throw new Error();
                return response.json();
            })
            .then(data => {
                manifestData = data;
                buildGallery(data);
                applyStaticStrings();
            })
            .catch(() => {
                appContainer.innerHTML = `<div class="status-msg">${T.accessDenied}</div>`;
            });
    }

    function applyStaticStrings() {
        document.documentElement.lang = T.htmlLang;
        document.title = T.pageTitle;
        const lbImg = document.getElementById('lightboxImg');
        if(lbImg) lbImg.alt = T.amplifiedView;
        const lbDown = document.getElementById('lightboxDownload');
        if(lbDown) lbDown.innerText = T.downloadImage;
    }

    function switchLang(lang) {
        if (lang === currentLang) return;
        currentLang = lang;
        T = STRINGS[currentLang];
        localStorage.setItem('signes_lang', lang);
        applyStaticStrings();

        if (manifestData) {
            buildGallery(manifestData);
        } else if (!projectId) {
            appContainer.innerHTML = `<div class="status-msg">${T.invalidLink}</div>`;
        }
    }

    function renderLangSwitch() {
        // Render inline con puntos medios separadores como en los canales del main portfolio
        document.getElementById('lang-wrapper').innerHTML = `
            <div class="lang-switch">
                ${SUPPORTED_LANGS.map((l, index) => `
                    <button class="lang-btn ${l === currentLang ? 'active' : ''}" onclick="switchLang('${l}')">${l}</button>${index < SUPPORTED_LANGS.length - 1 ? '·' : ''}
                `).join('')}
            </div>
        `;
    }

    function changeFaseTab(selectedKey) {
        document.querySelectorAll('#fases-menu li').forEach(li => {
            li.classList.remove('active-link');
        });
        const activeLi = document.getElementById(`nav-li-${selectedKey}`);
        if(activeLi) activeLi.classList.add('active-link');

        document.querySelectorAll('.fase-section').forEach(section => {
            section.classList.remove('active-section');
        });
        const activeSection = document.getElementById(`section-${selectedKey}`);
        if(activeSection) activeSection.classList.add('active-section');
    }

    function buildGallery(data) {
        dataStructure = { rev1: [], rev2: [], rev3: [], signes: [] };

        data.imagenes.forEach(fileName => {
            const lowerName = fileName.toLowerCase();
            if (lowerName.startsWith('rev1_')) dataStructure.rev1.push(fileName);
            else if (lowerName.startsWith('rev2_')) dataStructure.rev2.push(fileName);
            else if (lowerName.startsWith('rev3_')) dataStructure.rev3.push(fileName);
            else if (lowerName.startsWith('signes_')) dataStructure.signes.push(fileName);
        });

        // Metadatos estructurales debajo de la descripción de marca
        document.getElementById('project-meta-wrapper').innerHTML = `
            <div class="project-info-block">
                <h1 class="project-title">${escapeHtml(data.proyecto)}</h1>
                <div class="client-name">${escapeHtml(data.cliente)}</div>
            </div>
        `;

        renderLangSwitch();

        let hasContent = false;
        let menuHtml = '';
        let contentHtml = '';
        globalActiveImages = [];
        let firstActiveKey = null;

        for (const [faseKey, group] of Object.entries(dataStructure)) {
            if (group.length === 0) continue;
            hasContent = true;
            group.sort();

            if (!firstActiveKey) firstActiveKey = faseKey;

            menuHtml += `<li id="nav-li-${faseKey}" onclick="changeFaseTab('${faseKey}')">${T.fases[faseKey]}</li>`;

            contentHtml += `
                <section class="fase-section" id="section-${faseKey}">
                    <div class="fase-header">
                        <h2 class="fase-title">${T.fases[faseKey]}</h2>
                        <button class="download-all-btn" id="zipBtn-${faseKey}" onclick="downloadAllInSection('${faseKey}')">${T.downloadAll}</button>
                    </div>
                    <div class="grid">
            `;

            group.forEach(img => {
                const imgUrl = `${BUCKET_URL}/${projectId}/${img}`;
                let cleanCaption = img.replace(/^rev\d+_/i, '').replace(/^SIGNES_/i, '').replace(/\.[^/.]+$/, '').replace(/^[0-9]+[-_]/, '').replace(/[-_]/g, ' ');

                globalActiveImages.push({ url: imgUrl, caption: cleanCaption, filename: img });
                const currentGlobalIndex = globalActiveImages.length - 1;

                const thumbnailUrl = `${BUCKET_URL}/cdn-cgi/image/width=450,quality=80,format=auto/${projectId}/${img}`;

                contentHtml += `
                    <div class="image-card" onclick="openLightbox(${currentGlobalIndex})">
                        <a href="#" class="thumb-download" title="${T.downloadRender}" onclick="forceDownload('${imgUrl}', '${escapeHtml(img)}', event);">↓</a>
                        <img src="${thumbnailUrl}" alt="${escapeHtml(img)}" loading="lazy">
                        <div class="image-caption">${escapeHtml(cleanCaption)}</div>
                    </div>
                `;
            });

            contentHtml += `</div></section>`;
        }

        // El aviso de confidencialidad respira holgadamente aquí, al final de las rejillas de renders
        contentHtml += `
            <footer>
                <div class="legal-notice">
                    ${T.legalNotice}
                </div>
            </footer>
        `;

        if (hasContent) {
            document.getElementById('fases-menu').innerHTML = menuHtml;
            appContainer.innerHTML = contentHtml;
            changeFaseTab(firstActiveKey);
        } else {
            document.getElementById('fases-menu').innerHTML = '';
            appContainer.innerHTML = `<div class="status-msg">${T.noImages}</div>`;
        }
    }

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxCaption = document.getElementById('lightboxCaption');
    const lightboxDownload = document.getElementById('lightboxDownload');
    const lightboxWrapper = document.getElementById('lightboxWrapper');

    function openLightbox(index) {
        currentImageIndex = index;
        const currentData = globalActiveImages[currentImageIndex];
        
        lightboxImg.src = currentData.url;
        lightboxCaption.innerText = currentData.caption;
        lightboxDownload.href = currentData.url;
        lightboxDownload.setAttribute('download', currentData.filename);
        
        resetZoom();
        lightbox.classList.add('active');
    }

    function toggleZoom(event) {
        event.stopPropagation();
        if (lightboxWrapper.classList.contains('zoomed')) {
            resetZoom();
        } else {
            lightboxWrapper.classList.add('zoomed');
            panZoom(event);
        }
    }

    function panZoom(event) {
        if (!lightboxWrapper.classList.contains('zoomed')) return;
        const rect = lightboxWrapper.getBoundingClientRect();
        const x = ((event.clientX - rect.left) / rect.width) * 100;
        const y = ((event.clientY - rect.top) / rect.height) * 100;
        lightboxImg.style.transformOrigin = `${x}% ${y}%`;
    }

    function resetZoom() {
        lightboxWrapper.classList.remove('zoomed');
        lightboxImg.style.transformOrigin = 'center center';
    }

    function navigateImage(direction, event) {
        event.stopPropagation();
        currentImageIndex += direction;
        
        if (currentImageIndex >= globalActiveImages.length) currentImageIndex = 0;
        if (currentImageIndex < 0) currentImageIndex = globalActiveImages.length - 1;
        
        openLightbox(currentImageIndex);
    }

    function closeLightbox(event) {
        if (event.target.id === 'lightbox' || event.target.id === 'lightboxWrapper') {
            forceCloseLightbox();
        }
    }

    function forceCloseLightbox() {
        lightbox.classList.remove('active');
        resetZoom();
    }

    function forceDownload(fileUrl, fileName, event) {
        if (event) {
            event.preventDefault();
            event.stopPropagation();
        }
        const cleanUrl = `${fileUrl.split('?')[0]}?nocache=${new Date().getTime()}`;

        fetch(cleanUrl, {
            method: 'GET',
            mode: 'cors',
            credentials: 'omit'
        })
        .then(response => {
            if (!response.ok) throw new Error();
            return response.blob();
        })
        .then(blob => {
            const blobUrl = URL.createObjectURL(blob);
            const tempLink = document.createElement("a");
            tempLink.href = blobUrl;
            tempLink.download = fileName;
            document.body.appendChild(tempLink);
            tempLink.click();
            document.body.removeChild(tempLink);
            URL.revokeObjectURL(blobUrl);
        })
        .catch(() => {
            window.open(fileUrl, '_blank');
        });
    }

    function downloadAllInSection(faseKey) {
        const files = dataStructure[faseKey];
        if (!files || files.length === 0) return;

        const btn = document.getElementById(`zipBtn-${faseKey}`);
        const originalLabel = btn.innerText;
        btn.disabled = true;
        btn.innerText = T.preparingZip;

        const zip = new JSZip();
        let completed = 0;

        const fetchOne = (fileName) => {
            const imgUrl = `${BUCKET_URL}/${projectId}/${fileName}`;
            const cleanUrl = `${imgUrl}?nocache=${new Date().getTime()}`;
            return fetch(cleanUrl, { method: 'GET', mode: 'cors', credentials: 'omit' })
                .then(response => {
                    if (!response.ok) throw new Error(`Failed: ${fileName}`);
                    return response.blob();
                })
                .then(blob => {
                    zip.file(fileName, blob);
                    completed++;
                    btn.innerText = T.zipProgress(completed, files.length);
                });
        };

        const BATCH_SIZE = 4;
        let results = [];

        function runBatch(startIndex) {
            const batch = files.slice(startIndex, startIndex + BATCH_SIZE);
            if (batch.length === 0) return Promise.resolve();
            return Promise.allSettled(batch.map(fetchOne))
                .then(batchResults => {
                    results = results.concat(batchResults);
                    return runBatch(startIndex + BATCH_SIZE);
                });
        }

        runBatch(0).then(() => {
            const failed = results.filter(r => r.status === 'rejected').length;

            return zip.generateAsync({ type: 'blob' }).then(zipBlob => {
                const projectName = (manifestData && manifestData.proyecto) ? manifestData.proyecto : 'signes';
                const safeName = projectName.replace(/[^a-z0-9_\-]+/gi, '_');
                const zipFileName = `${safeName}_${faseKey}.zip`;

                const blobUrl = URL.createObjectURL(zipBlob);
                const tempLink = document.createElement('a');
                tempLink.href = blobUrl;
                tempLink.download = zipFileName;
                document.body.appendChild(tempLink);
                tempLink.click();
                document.body.removeChild(tempLink);
                URL.revokeObjectURL(blobUrl);

                if (failed > 0) alert(T.zipError);
            });
        })
        .catch(() => {
            alert(T.zipError);
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = originalLabel;
        });
    }

    document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'Escape') forceCloseLightbox();
        if (e.key === 'ArrowRight') navigateImage(1, e);
        if (e.key === 'ArrowLeft') navigateImage(-1, e);
    });
</script>
</body>
</html>
