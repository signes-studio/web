<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signes.Studio — Portal de Revisión</title>
    <style>
        /* Estética General Warm Minimalism / Japandi */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #fbfaf7;
            color: #1a1a1a;
            margin: 0;
            padding: 60px 20px;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        header { 
            margin-bottom: 60px; 
            border-bottom: 1px solid #e6e3dc; 
            padding-bottom: 24px; 
        }
        .logo { 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 0.15em; 
            font-weight: 600; 
            color: #1a1a1a;
        }
        .project-title { 
            font-size: 26px; 
            font-weight: 300; 
            letter-spacing: -0.01em; 
            margin: 16px 0 6px 0; 
            text-transform: uppercase; 
        }
        .client-name { 
            font-size: 13px; 
            color: #706e68; 
            font-weight: 300; 
        }
        
        /* Secciones y Grid de Renders */
        .fase-section { margin-bottom: 60px; }
        .fase-title { 
            font-size: 13px; 
            font-weight: 500; 
            text-transform: uppercase; 
            letter-spacing: 0.08em; 
            border-bottom: 1px solid #e6e3dc; 
            padding-bottom: 8px; 
            margin-bottom: 28px; 
            color: #8c887e; 
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 28px; 
        }
        
        /* Tarjeta del Render */
        .image-card { 
            background: #ffffff; 
            border: 1px solid #e6e3dc; 
            padding: 12px; 
            position: relative;
            cursor: zoom-in; 
            transition: transform 0.25s ease, box-shadow 0.25s ease; 
        }
        .image-card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 16px rgba(0,0,0,0.02); 
        }
        .image-card img { width: 100%; height: 210px; object-fit: cover; display: block; }
        .image-caption { 
            font-size: 12px; 
            color: #4a4a4a; 
            margin-top: 12px; 
            text-align: center; 
            font-weight: 300; 
            text-transform: capitalize; 
        }
        
        /* Botón de descarga directa sobre la miniatura */
        .thumb-download {
            position: absolute;
            top: 22px;
            right: 22px;
            background: rgba(251, 250, 247, 0.95);
            border: 1px solid #e6e3dc;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 15px;
            opacity: 0;
            transition: opacity 0.2s ease, background 0.2s ease, color 0.2s ease;
            z-index: 10;
        }
        .image-card:hover .thumb-download { opacity: 1; }
        .thumb-download:hover { background: #1a1a1a; color: #ffffff; border-color: #1a1a1a; }

        /* Visor Flotante / Lightbox Superpuesto */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(251, 250, 247, 0.98);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .lightbox.active { opacity: 1; pointer-events: auto; }
        
        /* Marco del Zoom */
        .lightbox-wrapper {
            position: relative;
            max-width: 85vw;
            max-height: 75vh;
            overflow: hidden;
            cursor: zoom-out;
        }
        .lightbox img {
            max-width: 100%;
            max-height: 75vh;
            display: block;
            object-fit: contain;
            transition: transform 0.1s ease-out;
            transform-origin: center center;
        }
        .lightbox-wrapper:hover img { transform: scale(1.5); cursor: crosshair; }

        /* Controles de Navegación */
        .lightbox-close {
            position: absolute;
            top: 35px; right: 40px;
            font-size: 32px; font-weight: 200;
            cursor: pointer; color: #706e68;
            background: none; border: none;
            z-index: 1010;
        }
        .lightbox-close:hover { color: #1a1a1a; }

        .nav-btn {
            position: absolute;
            top: 50%; transform: translateY(-50%);
            background: none; border: none;
            font-size: 36px; font-weight: 100; color: #706e68;
            cursor: pointer; padding: 20px; z-index: 1010;
            transition: color 0.2s ease;
        }
        .nav-btn:hover { color: #1a1a1a; }
        .nav-prev { left: 20px; }
        .nav-next { right: 20px; }

        /* Barra Inferior del Visor */
        .lightbox-actions {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 24px;
            align-items: center;
            background: #ffffff;
            padding: 12px 28px;
            border: 1px solid #e6e3dc;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            z-index: 1010;
        }
        .lightbox-caption { font-size: 13px; font-weight: 300; color: #1a1a1a; text-transform: capitalize; }
        .lightbox-download {
            color: #1a1a1a;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            border-left: 1px solid #e6e3dc;
            padding-left: 18px;
            letter-spacing: 0.02em;
        }
        .lightbox-download:hover { opacity: 0.5; }

        /* Texto Legal Pie de Página */
        footer {
            margin-top: 100px;
            border-top: 1px solid #e6e3dc;
            padding-top: 30px;
            text-align: center;
        }
        .legal-notice {
            max-width: 600px;
            margin: 0 auto;
            font-size: 11px;
            line-height: 1.6;
            color: #a09e96;
            font-weight: 300;
            letter-spacing: 0.01em;
        }

        .status-msg { text-align: center; padding: 120px 20px; font-weight: 300; color: #706e68; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="status-msg">Abriendo espacio de revisión confidencial...</div>
</div>

<!-- Ventana Flotante / Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="forceCloseLightbox()">&times;</button>
    
    <button class="nav-btn nav-prev" onclick="navigateImage(-1, event)">&#8249;</button>
    <button class="nav-btn nav-next" onclick="navigateImage(1, event)">&#8250;</button>
    
    <div class="lightbox-wrapper" id="lightboxWrapper" onmousemove="zoomPan(event)" onmouseleave="resetZoom()">
        <img id="lightboxImg" src="" alt="Vista ampliada">
    </div>
    
    <div class="lightbox-actions">
        <span class="lightbox-caption" id="lightboxCaption"></span>
        <a class="lightbox-download" id="lightboxDownload" href="#" download>Descargar Imagen ↓</a>
    </div>
</div>

<script>
    const BUCKET_URL = "https://share.signes.studio"; 

    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get('id');
    const appContainer = document.getElementById('app');

    const FASE_NAMES = {
        'rev1': '01. Primera Revisión — Volumetrías y Encuadres',
        'rev2': '02. Segunda Revisión — Iluminación y Materialidad',
        'rev3': '03. Tercera Revisión — Detalles y Ajustes Finales',
        'signes': '04. Entrega Final — Renders Autoría Signes'
    };

    let globalActiveImages = [];
    let currentImageIndex = 0;

    if (!projectId) {
        appContainer.innerHTML = '<div class="status-msg">Error 404: Enlace no válido.</div>';
    } else {
        fetch(`${BUCKET_URL}/${projectId}/manifest.json`)
            .then(response => {
                if (!response.ok) throw new Error();
                return response.json();
            })
            .then(data => buildGallery(data)) // Le pasamos todo el objeto data
            .catch(() => {
                appContainer.innerHTML = '<div class="status-msg">Acceso denegado o el ID del proyecto no existe en el búnker de archivos.</div>';
            });
    }

    function buildGallery(data) {
        const dataStructure = { rev1: [], rev2: [], rev3: [], signes: [] };

        data.imagenes.forEach(fileName => {
            const lowerName = fileName.toLowerCase();
            if (lowerName.startsWith('rev1_')) dataStructure.rev1.push(fileName);
            else if (lowerName.startsWith('rev2_')) dataStructure.rev2.push(fileName);
            else if (lowerName.startsWith('rev3_')) dataStructure.rev3.push(fileName);
            else if (lowerName.startsWith('signes_')) dataStructure.signes.push(fileName);
        });

        // Leemos dinámicamente el título del proyecto y el cliente desde tu manifest.json
        let html = `
            <header>
                <div class="logo">Signes.Studio</div>
                <h1 class="project-title">${data.proyecto}</h1>
                <div class="client-name">Cliente — ${data.cliente}</div>
            </header>
        `;

        let hasContent = false;
        globalActiveImages = [];

        for (const [faseKey, group] of Object.entries(dataStructure)) {
            if (group.length === 0) continue;
            hasContent = true;
            group.sort();

            html += `<section class="fase-section"><div class="fase-title">${FASE_NAMES[faseKey]}</div><div class="grid">`;

            group.forEach(img => {
                const imgUrl = `${BUCKET_URL}/${projectId}/${img}`;
                let cleanCaption = img.replace(/^rev\d+_/i, '').replace(/^SIGNES_/i, '').replace(/\.[^/.]+$/, '').replace(/^[0-9]+[-_]/, '').replace(/[-_]/g, ' ');

                globalActiveImages.push({ url: imgUrl, caption: cleanCaption, filename: img });
                const currentGlobalIndex = globalActiveImages.length - 1;

                html += `
                    <div class="image-card" onclick="openLightbox(${currentGlobalIndex})">
                        <a href="${imgUrl}" download="${img}" class="thumb-download" title="Descargar render" onclick="event.stopPropagation();">↓</a>
                        <img src="${imgUrl}" alt="${img}" loading="lazy">
                        <div class="image-caption">${cleanCaption}</div>
                    </div>
                `;
            });

            html += `</div></section>`;
        }

        html += `
            <footer>
                <div class="legal-notice">
                    Aviso de confidencialidad: El acceso a este enlace y a la documentación gráfica contenida es estrictamente privado y exclusivo para el cliente. Queda totalmente prohibida su distribución o filtración a terceros. Con el fin de optimizar el rendimiento y garantizar la privacidad del encargo, toda la información de este espacio será eliminada permanentemente transcurridos 15 días desde el cierre y entrega del proyecto.
                </div>
            </footer>
        `;

        appContainer.innerHTML = hasContent ? html : '<div class="status-msg">No se han encontrado imágenes en este espacio.</div>';
    }

    /* Funciones del Lightbox */
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxCaption = document.getElementById('lightboxCaption');
    const lightboxDownload = document.getElementById('lightboxDownload');

    function openLightbox(index) {
        currentImageIndex = index;
        const currentData = globalActiveImages[currentImageIndex];
        
        lightboxImg.src = currentData.url;
        lightboxCaption.innerText = currentData.caption;
        lightboxDownload.href = currentData.url;
        lightboxDownload.setAttribute('download', currentData.filename);
        
        lightbox.classList.add('active');
    }

    function navigateImage(direction, event) {
        event.stopPropagation();
        currentImageIndex += direction;
        
        if (currentImageIndex >= globalActiveImages.length) currentImageIndex = 0;
        if (currentImageIndex < 0) currentImageIndex = globalActiveImages.length - 1;
        
        openLightbox(currentImageIndex);
    }

    function closeLightbox(event) {
        if (event.target.id === 'lightbox' || event.target.id === 'lightboxWrapper') {
            forceCloseLightbox();
        }
    }

    function forceCloseLightbox() {
        lightbox.classList.remove('active');
        resetZoom();
    }

    function zoomPan(event) {
        const img = lightboxImg;
        const rect = event.currentTarget.getBoundingClientRect();
        const x = ((event.clientX - rect.left) / rect.width) * 100;
        const y = ((event.clientY - rect.top) / rect.height) * 100;
        img.style.transformOrigin = `${x}% ${y}%`;
    }

    function resetZoom() {
        lightboxImg.style.transformOrigin = 'center center';
    }

    document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'Escape') forceCloseLightbox();
        if (e.key === 'ArrowRight') navigateImage(1, e);
        if (e.key === 'ArrowLeft') navigateImage(-1, e);
    });
</script>
</body>
</html>
