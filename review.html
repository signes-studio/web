<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Signes.Studio — Portal de Revisión</title>
    <style>
        /* Estética General Warm Minimalism / Japandi */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #fbfaf7;
            color: #1a1a1a;
            margin: 0;
            padding: 60px 20px;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        header { 
            margin-bottom: 60px; 
            border-bottom: 1px solid #e6e3dc; 
            padding-bottom: 24px; 
        }
        .logo { 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 0.15em; 
            font-weight: 600; 
            color: #1a1a1a;
        }
        .project-title { 
            font-size: 26px; 
            font-weight: 300; 
            letter-spacing: -0.01em; 
            margin: 16px 0 6px 0; 
            text-transform: uppercase; 
        }
        .client-name { 
            font-size: 13px; 
            color: #706e68; 
            font-weight: 300; 
        }
        
        /* Secciones y Grid de Renders */
        .fase-section { margin-bottom: 60px; }
        .fase-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #e6e3dc; 
            padding-bottom: 8px; 
            margin-bottom: 28px; 
        }
        .fase-title { 
            font-size: 13px; 
            font-weight: 500; 
            text-transform: uppercase; 
            letter-spacing: 0.08em; 
            color: #8c887e; 
            margin: 0;
        }
        .fase-download-all {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #a09e96;
            text-decoration: none;
            font-weight: 400;
            transition: color 0.2s ease;
        }
        .fase-download-all:hover {
            color: #1a1a1a;
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 28px; 
        }
        
        /* Tarjeta del Render */
        .image-card { 
            background: #ffffff; 
            border: 1px solid #e6e3dc; 
            padding: 12px; 
            position: relative;
            cursor: zoom-in; 
            transition: transform 0.25s ease, box-shadow 0.25s ease; 
        }
        .image-card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 16px rgba(0,0,0,0.02); 
        }
        .image-card img { width: 100%; height: 210px; object-fit: cover; display: block; }
        .image-caption { 
            font-size: 12px; 
            color: #4a4a4a; 
            margin-top: 12px; 
            text-align: center; 
            font-weight: 300; 
            text-transform: capitalize; 
        }
        
        /* Botón de descarga directa sobre la miniatura */
        .thumb-download {
            position: absolute;
            top: 22px;
            right: 22px;
            background: rgba(251, 250, 247, 0.95);
            border: 1px solid #e6e3dc;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 15px;
            opacity: 0;
            transition: opacity 0.2s ease, background 0.2s ease, color 0.2s ease;
            z-index: 10;
        }
        .image-card:hover .thumb-download { opacity: 1; }
        .thumb-download:hover { background: #1a1a1a; color: #ffffff; border-color: #1a1a1a; }

        /* Visor Flotante / Lightbox Superpuesto */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(251, 250, 247, 0.98);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .lightbox.active { opacity: 1; pointer-events: auto; }
        
        /* Marco del Zoom Ajustado (Sin Auto-Zoom) */
        .lightbox-wrapper {
            position: relative;
            max-width: 85vw;
            max-height: 75vh;
            overflow: hidden;
            cursor: zoom-in; /* Cambiado para sugerir ampliación */
        }
        .lightbox img {
            max-width: 100%;
            max-height: 75vh;
            display: block;
            object-fit: contain;
            transition: transform 0.15s ease-out;
            transform-origin: center center;
        }
        /* Estado de zoom activo al hacer clic */
        .lightbox-wrapper.zoomed {
            cursor: zoom-out;
        }
        .lightbox-wrapper.zoomed img {
            transform: scale(2); /* Zoom manual controlado */
        }

        /* Controles de Navegación */
        .lightbox-close {
            position: absolute;
            top: 35px; right: 40px;
            font-size: 32px; font-weight: 200;
            cursor: pointer; color: #706e68;
            background: none; border: none;
            z-index: 1010;
        }
        .lightbox-close:hover { color: #1a1a1a; }

        .nav-btn {
            position: absolute;
            top: 50%; transform: translateY(-50%);
            background: none; border: none;
            font-size: 36px; font-weight: 100; color: #706e68;
            cursor: pointer; padding: 20px; z-index: 1010;
            transition: color 0.2s ease;
        }
        .nav-btn:hover { color: #1a1a1a; }
        .nav-prev { left: 20px; }
        .nav-next { right: 20px; }

        /* Barra Inferior del Visor */
        .lightbox-actions {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 24px;
            align-items: center;
            background: #ffffff;
            padding: 12px 28px;
            border: 1px solid #e6e3dc;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            z-index: 1010;
        }
        .lightbox-caption { font-size: 13px; font-weight: 300; color: #1a1a1a; text-transform: capitalize; }
        .lightbox-download {
            color: #1a1a1a;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            border-left: 1px solid #e6e3dc;
            padding-left: 18px;
            letter-spacing: 0.02em;
        }
        .lightbox-download:hover { opacity: 0.5; }

        /* Texto Legal Pie de Página */
        footer {
            margin-top: 100px;
            border-top: 1px solid #e6e3dc;
            padding-top: 30px;
            text-align: center;
        }
        .legal-notice {
            max-width: 600px;
            margin: 0 auto;
            font-size: 11px;
            line-height: 1.6;
            color: #a09e96;
            font-weight: 300;
            letter-spacing: 0.01em;
        }

        .status-msg { text-align: center; padding: 120px 20px; font-weight: 300; color: #706e68; }
    </style>
    <!-- Librería externa ligera y segura para la generación de ZIPs en local -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<div class="container" id="app">
    <div class="status-msg">Opening confidential review space...</div>
</div>

<!-- Ventana Flotante / Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="forceCloseLightbox()">&times;</button>
    
    <button class="nav-btn nav-prev" onclick="navigateImage(-1, event)">&#8249;</button>
    <button class="nav-btn nav-next" onclick="navigateImage(1, event)">&#8250;</button>
    
    <!-- El wrapper ahora maneja el click de zoom y el movimiento de lupa -->
    <div class="lightbox-wrapper" id="lightboxWrapper" onclick="toggleZoom(event)" onmousemove="panZoom(event)">
        <img id="lightboxImg" src="" alt="Amplied view">
    </div>
    
    <div class="lightbox-actions">
        <span class="lightbox-caption" id="lightboxCaption"></span>
        <a class="lightbox-download" id="lightboxDownload" href="#" download>Download Image ↓</a>
    </div>
</div>

<script>
    const BUCKET_URL = "https://share.signes.studio"; 

    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get('id');
    const appContainer = document.getElementById('app');

    // Títulos traducidos al inglés para un look internacional
    const FASE_NAMES = {
        'rev1': '01. First Draft — Volumetrics & Framing',
        'rev2': '02. Second Draft — Lighting & Materiality',
        'rev3': '03. Third Draft — Details & Final Adjustments',
        'signes': '04. Final Delivery'
    };

    let globalActiveImages = [];
    let currentImageIndex = 0;
    let dataStructure = { rev1: [], rev2: [], rev3: [], signes: [] };

    if (!projectId) {
        appContainer.innerHTML = '<div class="status-msg">Error 404: Invalid link.</div>';
    } else {
        fetch(`${BUCKET_URL}/${projectId}/manifest.json`)
            .then(response => {
                if (!response.ok) throw new Error();
                return response.json();
            })
            .then(data => buildGallery(data))
            .catch(() => {
                appContainer.innerHTML = '<div class="status-msg">Access denied or project ID does not exist in the vault.</div>';
            });
    }

    function buildGallery(data) {
        dataStructure = { rev1: [], rev2: [], rev3: [], signes: [] };

        data.imagenes.forEach(fileName => {
            const lowerName = fileName.toLowerCase();
            if (lowerName.startsWith('rev1_')) dataStructure.rev1.push(fileName);
            else if (lowerName.startsWith('rev2_')) dataStructure.rev2.push(fileName);
            else if (lowerName.startsWith('rev3_')) dataStructure.rev3.push(fileName);
            else if (lowerName.startsWith('signes_')) dataStructure.signes.push(fileName);
        });

        // Limpieza de títulos: eliminado el texto "Cliente — " y quitado "Renders autoría Signes" de la fase final
        let html = `
            <header>
                <div class="logo">Signes.Studio</div>
                <h1 class="project-title">${data.proyecto}</h1>
                <div class="client-name">${data.cliente}</div>
            </header>
        `;

        let hasContent = false;
        globalActiveImages = [];

        for (const [faseKey, group] of Object.entries(dataStructure)) {
            if (group.length === 0) continue;
            hasContent = true;
            group.sort();

            // Añadido el botón dinámico "Download All" al lado de cada título de categoría
            html += `
                <section class="fase-section">
                    <div class="fase-header">
                        <h2 class="fase-title">${FASE_NAMES[faseKey]}</h2>
                        <a href="#" class="fase-download-all" onclick="downloadAsZip('${faseKey}', '${data.proyecto}', event)">Download All (.zip)</a>
                    </div>
                    <div class="grid">
            `;

            group.forEach(img => {
                const imgUrl = `${BUCKET_URL}/${projectId}/${img}`;
                // Limpieza estética del pie de la miniatura según tus reglas de autoría
                let cleanCaption = img.replace(/^rev\d+_/i, '').replace(/^SIGNES_/i, '').replace(/\.[^/.]+$/, '').replace(/^[0-9]+[-_]/, '').replace(/[-_]/g, ' ');

                globalActiveImages.push({ url: imgUrl, caption: cleanCaption, filename: img });
                const currentGlobalIndex = globalActiveImages.length - 1;

                html += `
                    <div class="image-card" onclick="openLightbox(${currentGlobalIndex})">
                        <a href="${imgUrl}" download="${img}" class="thumb-download" title="Download render" onclick="event.stopPropagation();">↓</a>
                        <img src="${imgUrl}" alt="${img}" loading="lazy">
                        <div class="image-caption">${cleanCaption}</div>
                    </div>
                `;
            });

            html += `</div></section>`;
        }

        html += `
            <footer>
                <div class="legal-notice">
                    Confidentiality Notice: Access to this link and the contained graphic material is strictly private and exclusive to the client. Its distribution or leakage to third parties is entirely prohibited. To optimize performance and ensure project privacy, all information within this space will be permanently deleted 15 days after project closure and final delivery.
                </div>
            </footer>
        `;

        appContainer.innerHTML = hasContent ? html : '<div class="status-msg">No images found in this space.</div>';
    }

    /* Lógica Avanzada del Lightbox (Sin Auto-Zoom + Lupa interactiva) */
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxCaption = document.getElementById('lightboxCaption');
    const lightboxDownload = document.getElementById('lightboxDownload');
    const lightboxWrapper = document.getElementById('lightboxWrapper');

    function openLightbox(index) {
        currentImageIndex = index;
        const currentData = globalActiveImages[currentImageIndex];
        
        lightboxImg.src = currentData.url;
        lightboxCaption.innerText = currentData.caption;
        lightboxDownload.href = currentData.url;
        lightboxDownload.setAttribute('download', currentData.filename);
        
        resetZoom();
        lightbox.classList.add('active');
    }

    // Activa/Desactiva el zoom al hacer click (Estilo Lupa)
    function toggleZoom(event) {
        event.stopPropagation();
        if (lightboxWrapper.classList.contains('zoomed')) {
            resetZoom();
        } else {
            lightboxWrapper.classList.add('zoomed');
            panZoom(event); // Centra la lupa al instante del click
        }
    }

    // Mueve la imagen bajo el cursor coordinando las coordenadas de la lupa
    function panZoom(event) {
        if (!lightboxWrapper.classList.contains('zoomed')) return;
        const rect = lightboxWrapper.getBoundingClientRect();
        const x = ((event.clientX - rect.left) / rect.width) * 100;
        const y = ((event.clientY - rect.top) / rect.height) * 100;
        lightboxImg.style.transformOrigin = `${x}% ${y}%`;
    }

    function resetZoom() {
        lightboxWrapper.classList.remove('zoomed');
        lightboxImg.style.transformOrigin = 'center center';
    }

    function navigateImage(direction, event) {
        event.stopPropagation();
        currentImageIndex += direction;
        
        if (currentImageIndex >= globalActiveImages.length) currentImageIndex = 0;
        if (currentImageIndex < 0) currentImageIndex = globalActiveImages.length - 1;
        
        openLightbox(currentImageIndex);
    }

    function closeLightbox(event) {
        if (event.target.id === 'lightbox' || event.target.id === 'lightboxWrapper') {
            forceCloseLightbox();
        }
    }

    function forceCloseLightbox() {
        lightbox.classList.remove('active');
        resetZoom();
    }

    /* Motor de Descargas Masivas (.ZIP por Categorías) */
    function downloadAsZip(faseKey, projectName, event) {
        event.preventDefault();
        const targetElement = event.target;
        const filesToDownload = dataStructure[faseKey];

        if (!filesToDownload || filesToDownload.length === 0) return;

        const originalText = targetElement.innerText;
        targetElement.innerText = "Zipping...";
        targetElement.style.pointerEvents = "none";

        const zip = new JSZip();
        const folderName = `${projectName.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${faseKey}`;
        const zipFolder = zip.folder(folderName);

        // Descarga y empaquetado en paralelo
        const downloadPromises = filesToDownload.map(fileName => {
            const fileUrl = `${BUCKET_URL}/${projectId}/${fileName}`;
            return fetch(fileUrl)
                .then(response => {
                    if (!response.ok) throw new Error(`Failed to fetch ${fileName}`);
                    return response.blob();
                })
                .then(blob => {
                    zipFolder.file(fileName, blob);
                })
                .catch(err => console.error(err));
        });

        Promise.all(downloadPromises).then(() => {
            zip.generateAsync({ type: "blob" }).then(content => {
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = `${folderName}.zip`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                targetElement.innerText = originalText;
                targetElement.style.pointerEvents = "auto";
            });
        });
    }

    document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'Escape') forceCloseLightbox();
        if (e.key === 'ArrowRight') navigateImage(1, e);
        if (e.key === 'ArrowLeft') navigateImage(-1, e);
    });
</script>
</body>
</html>
