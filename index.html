<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNES.STUDIO | Creative Studio</title>
    <!-- Elegant and minimalist font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* Basic reset and design variables */
        :root {
            --bg-color: #fcfbf9;       /* Warm white / ivory */
            --text-main: #1a1a1a;      /* Dark charcoal */
            --text-muted: #707070;     /* Soft grey for secondary text */
            --accent: #8c8275;         /* Muted earth tone */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        /* Main container */
        .container {
            max-width: 600px;
            text-align: center;
            animation: fadeIn 1.2s ease-out;
        }

        /* Branding / Identity */
        h1 {
            font-size: 1.75rem;
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 4rem;
        }

        /* Contact Details */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .contact-link {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-main);
            text-decoration: none;
            letter-spacing: 0.03em;
            transition: color 0.3s ease;
        }

        /* Subtle hover effect */
        .contact-link:hover {
            color: var(--accent);
        }

        /* Minimal divider */
        .divider {
            width: 30px;
            height: 1px;
            background-color: #e0dbd5;
            margin: 3rem auto;
        }

        /* Smooth fade-in animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive adjustments for mobile */
        @media (max-width: 480px) {
            h1 { font-size: 1.4rem; letter-spacing: 0.2em; }
            .subtitle { margin-bottom: 3rem; }
            .divider { margin: 2rem auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <h1>SIGNES.STUDIO</h1>
        <p class="subtitle">Creative Studio</p>

        <div class="divider"></div>

        <!-- Contact Info -->
        <div class="contact-info">
            <!-- Replace these with your final details -->
            <a href="mailto:hello@signes.studio" class="contact-link">hello@signes.studio</a>
            <a href="tel:+34600000000" class="contact-link">+34 600 000 000</a>
        </div>
    </div>

</body>
</html>
