<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>SIGNES.STUDIO — Review Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* Estética Unificada: SIGNES.STUDIO Warm Minimalism System */
        :root {
            --bg: #F4F4F4;        
            --ink: #000000;       
            --ink-muted: #777777; 
            --line: #EAEAEA;
        }

        body {
            font-family: 'Archivo', sans-serif;
            background-color: var(--bg);
            color: var(--ink);
            margin: 0;
            padding: 60px 20px;
            letter-spacing: 0.06em;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        header { 
            margin-bottom: 60px; 
            border-bottom: 1px solid var(--line); 
            padding-bottom: 24px; 
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .header-main { flex: 1; }
        
        /* Ajuste de logo para calcar la web principal */
        .logo { 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 0.08em; 
            color: var(--ink);
        }
        .logo .bold { font-weight: 500; }
        .logo .light { font-weight: 300; }

        .project-title { 
            font-size: 24px; 
            font-weight: 300; 
            letter-spacing: 0.02em; 
            margin: 16px 0 6px 0; 
            text-transform: uppercase; 
        }
        .client-name { 
            font-size: 11px; 
            color: var(--ink-muted); 
            font-weight: 300; 
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* Selector de idioma minimalista */
        .lang-switch {
            display: flex;
            gap: 6px;
            margin-top: 2px;
        }
        .lang-btn {
            font-family: 'Archivo', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--ink-muted);
            background: none;
            border: 1px solid var(--line);
            padding: 4px 9px;
            border-radius: 0px; /* Bordes rectos para mantener el rigor geométrico */
            cursor: pointer;
            font-weight: 400;
            transition: color 0.2s ease, border-color 0.2s ease;
        }
        .lang-btn:hover, .lang-btn.active { color: var(--ink); border-color: var(--ink); }
        
        /* Secciones y Grid de Renders */
        .fase-section { margin-bottom: 60px; }
        .fase-header {
            border-bottom: 1px solid var(--line); 
            padding-bottom: 8px; 
            margin-bottom: 28px; 
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 16px;
        }
        .fase-title { 
            font-size: 11px; 
            font-weight: 500; 
            text-transform: uppercase; 
            letter-spacing: 0.08em; 
            color: var(--ink-muted); 
            margin: 0;
        }
        .download-all-btn {
            font-family: 'Archivo', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--ink);
            background: none;
            border: 1px solid var(--line);
            padding: 5px 12px;
            border-radius: 0px;
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
            transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }
        .download-all-btn:hover:not(:disabled) { color: var(--bg); background: var(--ink); border-color: var(--ink); }
        .download-all-btn:disabled { opacity: 0.4; cursor: default; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 28px; 
        }
        
        /* Tarjeta del Render estilo Galería */
        .image-card { 
            background: #ffffff; 
            border: 1px solid var(--line); 
            padding: 12px; 
            position: relative;
            cursor: zoom-in; 
            transition: transform 0.25s ease, box-shadow 0.25s ease; 
        }
        .image-card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(0,0,0,0.03); 
        }
        .image-card img { width: 100%; height: 210px; object-fit: cover; display: block; }
        .image-caption { 
            font-size: 11px; 
            color: var(--ink); 
            margin-top: 12px; 
            text-align: left; /* Alineado a la izquierda como en el porfolio */
            font-weight: 400; 
            text-transform: uppercase; 
        }
        
        /* Botón de descarga directa sobre la miniatura */
        .thumb-download {
            position: absolute;
            top: 22px;
            right: 22px;
            background: rgba(244, 244, 244, 0.95);
            border: 1px solid var(--line);
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            text-decoration: none;
            color: var(--ink);
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s ease, background 0.2s ease, color 0.2s ease;
            z-index: 10;
        }
        .image-card:hover .thumb-download { opacity: 1; }
        .thumb-download:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }

        /* Visor Flotante / Lightbox Superpuesto */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(244, 244, 244, 0.98);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .lightbox.active { opacity: 1; pointer-events: auto; }
        
        .lightbox-wrapper {
            position: relative;
            max-width: 85vw;
            max-height: 75vh;
            overflow: hidden;
            cursor: zoom-in;
        }
        .lightbox img {
            max-width: 100%;
            max-height: 75vh;
            display: block;
            object-fit: contain;
            transition: transform 0.15s ease-out;
            transform-origin: center center;
        }
        .lightbox-wrapper.zoomed { cursor: zoom-out; }
        .lightbox-wrapper.zoomed img { transform: scale(2); }

        .lightbox-close {
            position: absolute;
            top: 35px; right: 40px;
            font-size: 32px; font-weight: 200;
            cursor: pointer; color: var(--ink-muted);
            background: none; border: none;
            z-index: 1010;
        }
        .lightbox-close:hover { color: var(--ink); }

        .nav-btn {
            position: absolute;
            top: 50%; transform: translateY(-50%);
            background: none; border: none;
            font-size: 36px; font-weight: 100; color: var(--ink-muted);
            cursor: pointer; padding: 20px; z-index: 1010;
            transition: color 0.2s ease;
        }
        .nav-btn:hover { color: var(--ink); }
        .nav-prev { left: 20px; }
        .nav-next { right: 20px; }

        /* Barra Inferior del Visor */
        .lightbox-actions {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 24px;
            align-items: center;
            background: #ffffff;
            padding: 12px 28px;
            border: 1px solid var(--line);
            border-radius: 0px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.01);
            z-index: 1010;
        }
        .lightbox-caption { font-size: 11px; font-weight: 400; color: var(--ink); text-transform: uppercase; }
        .lightbox-download {
            font-family: 'Archivo', sans-serif;
            color: var(--ink);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            border-left: 1px solid var(--line);
            padding-left: 18px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .lightbox-download:hover { opacity: 0.5; }

        .security-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 140px 20px;
        }
        #turnstile-widget { margin-top: 24px; }

        footer {
            margin-top: 100px;
            border-top: 1px solid var(--line);
            padding-top: 30px;
            text-align: center;
        }
        .legal-notice {
            max-width: 680px;
            margin: 0 auto;
            font-size: 10px;
            line-height: 1.6;
            color: var(--ink-muted);
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .status-msg { text-align: center; padding: 120px 20px; font-weight: 300; color: var(--ink-muted); font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; }

        @media (max-width: 560px) {
            header { flex-direction: column; gap: 20px; align-items: flex-start; }
            .lang-switch { margin-top: 0; }
        }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
