<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNES | Visual Research</title>
    
    <meta name="description" content="SIGNES — Visual Research. Architectural curation and material memory.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="scroll-container">

        <section class="panel cover">
            <div class="container">
                <h1 class="logo">
                    <span class="bold">SIGNES</span>
                </h1>
                <p class="subtitle">Visual Research</p>
            </div>
            <div class="scroll-indicator">[ Scroll ]</div>
        </section>

        <section class="panel">
            <picture class="image-wrapper">
                <source media="(max-width: 768px)" srcset="img/img-01-mobile.webp">
                <img src="img/img-01-desktop.webp" alt="SIGNES Visual Research - Archive Vol I - 01" class="obra-visual">
            </picture>
        </section>

        <section class="panel">
            <picture class="image-wrapper">
                <source media="(max-width: 768px)" srcset="img/img-02-mobile.webp">
                <img src="img/img-02-desktop.webp" alt="SIGNES Visual Research - Archive Vol I - 02" class="obra-visual">
            </picture>
        </section>

        <section class="panel">
            <picture class="image-wrapper">
                <source media="(max-width: 768px)" srcset="img/img-03-mobile.webp">
                <img src="img/img-03-desktop.webp" alt="SIGNES Visual Research - Archive Vol I - 03" class="obra-visual">
            </picture>
        </section>

        <section class="panel">
            <picture class="image-wrapper">
                <source media="(max-width: 768px)" srcset="img/img-04-mobile.webp">
                <img src="img/img-04-desktop.webp" alt="SIGNES Visual Research - Archive Vol I - 04" class="obra-visual">
            </picture>
        </section>

        <section class="panel">
            <picture class="image-wrapper">
                <source media="(max-width: 768px)" srcset="img/img-05-mobile.webp">
                <img src="img/img-05-desktop.webp" alt="SIGNES Visual Research - Archive Vol I - 05" class="obra-visual">
            </picture>
        </section>

        <section class="panel">
            <picture class="image-wrapper">
                <source media="(max-width: 768px)" srcset="img/img-06-mobile.webp">
                <img src="img/img-06-desktop.webp" alt="SIGNES Visual Research - Archive Vol I - 06" class="obra-visual">
            </picture>
        </section>

        <section class="panel footer-panel">
            <div class="manifesto">
                <p class="italic-text">"Exploring material memory through art direction and visual archaeology."</p>
                <p class="project-details">Vol. I — SANTA FE: The Unbuilt Archive</p>
            </div>
            
            <footer class="footer">
                <a href="mailto:office@signes.studio" class="contact-link">office@signes.studio</a>
            </footer>
        </section>

    </div>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
        }
    </script>
</body>
</html>
