<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>SIGNES.STUDIO | Visual Research</title>

    <meta property="og:title" content="SIGNES.STUDIO | Visual Research">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://signes.studio">
    <meta property="og:description" content="High-end architectural visualization and visual research studio.">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CreativeWork",
      "name": "Signes Studio",
      "url": "https://signes.studio",
      "description": "Professional architectural visualization and visual research creative studio.",

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        body { font-family: 'Cormorant', serif; margin: 0; padding: 0; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .logo { font-size: 2.5rem; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
        .bold { font-weight: 600; }
        .extralight { font-weight: 300; }
        .subtitle { font-size: 1.2rem; font-weight: 400; color: #666; margin-top: 0; }
        .contact-link { color: #888; text-decoration: none; transition: color 0.3s ease; }
        .contact-link:hover { color: #2c2c2c; }
    </style>
</head>
<body>

    <main class="container">
        <h1 class="logo">
            <span class="bold">SIGNES.STUDIO</span><span class="extralight">.STUDIO</span>
        </h1>
        <p class="subtitle">Visual Research</p>
    </main>

    <footer class="footer" style="position: fixed; bottom: 30px; width: 100%; text-align: center;">
        <a href="mailto:office@signes.studio" class="contact-link">office@signes.studio</a>
    </footer>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };
    </script>
</body>
