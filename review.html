<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signes.Studio — Portal de Revisión</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #fbfaf7;
            color: #1a1a1a;
            margin: 0;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header { margin-bottom: 50px; border-bottom: 1px solid #e6e3dc; padding-bottom: 20px; }
        .logo { font-size: 14px; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 600; }
        .project-title { font-size: 24px; font-weight: 300; letter-spacing: -0.02em; margin: 15px 0 5px 0; text-transform: uppercase; }
        .fase-section { margin-bottom: 50px; }
        .fase-title { font-size: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid #e6e3dc; padding-bottom: 8px; margin-bottom: 25px; color: #8c887e; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .image-card { background: #ffffff; border: 1px solid #e6e3dc; padding: 12px; cursor: pointer; transition: transform 0.2s ease; }
        .image-card:hover { transform: translateY(-2px); }
        .image-card img { width: 100%; height: 210px; object-fit: cover; display: block; }
        .image-caption { font-size: 12px; color: #555; margin-top: 10px; text-align: center; font-weight: 300; text-transform: capitalize; }
        .status-msg { text-align: center; padding: 100px 20px; font-weight: 300; color: #706e68; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="status-msg">Abriendo espacio de revisión confidencial...</div>
</div>

<script>
    const BUCKET_URL = "https://share.signes.studio"; // Tu subdominio de Cloudflare

    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get('id');
    const appContainer = document.getElementById('app');

    const FASE_NAMES = {
        'rev1': '01. Primera Revisión — Volumetrías y Encuadres',
        'rev2': '02. Segunda Revisión — Iluminación y Materialidad',
        'rev3': '03. Tercera Revisión — Detalles y Ajustes Finales',
        'signes': '04. Entrega Final — Renders Autoría Signes'
    };

    if (!projectId) {
        appContainer.innerHTML = '<div class="status-msg">Error 404: Enlace no válido.</div>';
    } else {
        // Leemos el archivo manifest.json específico de la carpeta del cliente
        fetch(`${BUCKET_URL}/${projectId}/manifest.json`)
            .then(response => {
                if (!response.ok) throw new Error();
                return response.json();
            })
            .then(data => {
                buildGallery(data.imagenes);
            })
            .catch(() => {
                appContainer.innerHTML = '<div class="status-msg">Acceso denegado o el ID del proyecto no existe en el búnker de archivos.</div>';
            });
    }

    function buildGallery(fileNames) {
        const dataStructure = { rev1: [], rev2: [], rev3: [], signes: [] };

        fileNames.forEach(fileName => {
            const lowerName = fileName.toLowerCase();
            if (lowerName.startsWith('rev1_')) dataStructure.rev1.push(fileName);
            else if (lowerName.startsWith('rev2_')) dataStructure.rev2.push(fileName);
            else if (lowerName.startsWith('rev3_')) dataStructure.rev3.push(fileName);
            else if (lowerName.startsWith('signes_')) dataStructure.signes.push(fileName);
        });

        let displayTitle = projectId.replace(/-/g, ' ');

        let html = `
            <header>
                <div class="logo">Signes.Studio</div>
                <h1 class="project-title">${displayTitle}</h1>
            </header>
        `;

        let hasContent = false;

        for (const [faseKey, group] of Object.entries(dataStructure)) {
            if (group.length === 0) continue;
            hasContent = true;

            group.sort(); // Ordenar alfabéticamente dentro de cada fase (01, 02...)

            html += `
                <section class="fase-section">
                    <div class="fase-title">${FASE_NAMES[faseKey]}</div>
                    <div class="grid">
            `;

            group.forEach(img => {
                const imgUrl = `${BUCKET_URL}/${projectId}/${img}`;
                
                // Limpieza estética del pie de foto para que quede editorial
                let cleanCaption = img.replace(/^rev\d+_/i, '')
                                      .replace(/^SIGNES_/i, '')
                                      .replace(/\.[^/.]+$/, '') // Quita extensión
                                      .replace(/^[0-9]+[-_]/, '') // Quita números iniciales de orden
                                      .replace(/[-_]/g, ' '); // Cambia guiones por espacios

                html += `
                    <div class="image-card" onclick="window.open('${imgUrl}', '_blank')">
                        <img src="${imgUrl}" alt="${img}" loading="lazy">
                        <div class="image-caption">${cleanCaption}</div>
                    </div>
                `;
            });

            html += `</div></section>`;
        }

        appContainer.innerHTML = hasContent ? html : '<div class="status-msg">No se han encontrado imágenes en este espacio.</div>';
    }
</script>
</body>
</html>
